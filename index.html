<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Código de Participação</title>
    <link rel="stylesheet" href="style.css" />
    <script>
      function setCookie(name, value, days) {
        let expires = "";
        if (days) {
          let date = new Date();
          date.setTime(date.getTime() + days * 24 * 60 * 60 * 1000);
          expires = "; expires=" + date.toUTCString();
        }
        document.cookie = name + "=" + (value || "") + expires + "; path=/";
      }

      function getCookie(name) {
        let nameEQ = name + "=";
        let ca = document.cookie.split(";");
        for (let i = 0; i < ca.length; i++) {
          let c = ca[i];
          while (c.charAt(0) === " ") c = c.substring(1, c.length);
          if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
        }
        return null;
      }

      function generateUUID() {
        return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function (c) {
          var r = (Math.random() * 16) | 0,
            v = c === "x" ? r : (r & 0x3) | 0x8;
          return v.toString(16);
        });
      }

      function gerarCodigo() {
        let clientId = getCookie("clientId");
        if (!clientId) {
          clientId = generateUUID();
          setCookie("clientId", clientId, 365);
        }

        const codigoExistente = localStorage.getItem("codigoParticipacao");
        const displayCodigo = document.getElementById("codigo");
        const displayMensagem = document.getElementById("mensagem");

        if (codigoExistente) {
          displayCodigo.innerText = codigoExistente;
          displayMensagem.innerText = "Você já gerou um código. Este é o seu código de participação.";
          return;
        }

        const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const numeros = "0123456789";
        let codigo = "";
        for (let i = 0; i < 2; i++) codigo += letras[Math.floor(Math.random() * letras.length)];
        for (let i = 0; i < 4; i++) codigo += numeros[Math.floor(Math.random() * numeros.length)];

        displayCodigo.innerText = codigo;
        localStorage.setItem("codigoParticipacao", codigo);

        const endpoint = "SUA_URL_DO_GOOGLE_SCRIPT_AQUI";

        fetch(endpoint, {
          method: "POST",
          mode: "no-cors", // Necessário para Google Apps Script
          headers: {
            "Content-Type": "text/plain;charset=utf-8",
          },
          body: JSON.stringify({
            clientId: clientId,
            codigo: codigo,
          }),
        })
          .then(() => console.log("Dados enviados."))
          .catch((err) => console.error("Erro no envio:", err));
      }

      function copiarCodigo() {
        const codigo = document.getElementById("codigo").innerText;
        if (codigo) {
          navigator.clipboard.writeText(codigo)
            .then(() => alert("Código copiado!"))
            .catch((err) => alert("Erro ao copiar: " + err));
        }
      }

      window.onload = gerarCodigo;
    </script>
  </head>
  <body>
    <h2>Obrigado por responder!</h2>
    <p>Seu código de participação é: <strong id="codigo"></strong></p>
    <p id="mensagem"></p>
    <p>Guarde este código para participar do sorteio.</p>
    <p>O resultado será divulgado em <strong>31/03/2026</strong>.</p>
    <button onclick="copiarCodigo()">Copiar Código</button>
  </body>
</html>
